name: Deploy Teaching Analytics to Render

on:
  push:
    branches: [main]
    paths:
      - 'apps/teaching_analytics/**'

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Trigger Render Deploy
        env:
          RENDER_API_KEY: ${{ secrets.RENDER_API_KEY }}
        run: |
          # Trigger a deploy on Render via their API
          # Replace SERVICE_ID with your Render service ID
          curl -s -X POST "https://api.render.com/v1/services/$RENDER_SERVICE_ID/deploys" \
            -H "Accept: application/json" \
            -H "Content-Type: application/json" \
            -H "Authorization: Bearer $RENDER_API_KEY" \
            -d '{}' || echo "Render deploy trigger failed — check API key and service ID"
