name: Deploy to Cloudflare Pages

on:
  push:
    branches: [main]
    paths:
      - 'quarto/**'
      - 'teaching/**/slides/**'
      - 'apps/hct-ml-marketing-lab.html'
      - 'apps/teaching_analytics/feedback_form.html'
  workflow_dispatch:

permissions:
  contents: read
  deployments: write

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install Python dependencies
        run: pip install -r requirements.txt

      - name: Install Quarto
        uses: quarto-dev/quarto-actions/setup@v2

      - name: Render Quarto site
        run: |
          cd quarto/website
          quarto render

      - name: Add static assets
        run: |
          mkdir -p quarto/website/_site/labs/hct-ml-lab
          cp apps/hct-ml-marketing-lab.html quarto/website/_site/labs/hct-ml-lab/index.html
          mkdir -p quarto/website/_site/feedback
          cp apps/teaching_analytics/feedback_form.html quarto/website/_site/feedback/index.html

      - name: Deploy to Cloudflare Pages
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: npx wrangler@latest pages deploy quarto/website/_site --project-name=quantitative-marketing-analytics
