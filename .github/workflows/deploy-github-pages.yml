name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
    paths:
      - 'quarto/**'
      - 'teaching/**/slides/**'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: github-pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Install Quarto
        uses: quarto-dev/quarto-actions/setup@v2

      - name: Render site
        run: |
          cd quarto/website
          quarto render

      - name: Render teaching slides
        run: |
          for qmd in teaching/2026_spring/*/slides/*.qmd; do
            if [ -f "$qmd" ]; then
              echo "Rendering $qmd"
              slide_name=$(basename $(dirname $(dirname "$qmd")))
              output_dir="quarto/website/_site/teaching/${slide_name}"
              mkdir -p "$output_dir"
              quarto render "$qmd" --output-dir "$output_dir" --execute false
            fi
          done

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: quarto/website/_site

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
