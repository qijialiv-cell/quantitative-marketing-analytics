name: Deploy HCT Lab to Cloudflare Pages

on:
  push:
    branches: [main]
    paths:
      - 'apps/hct-ml-marketing-lab.html'
  workflow_dispatch:

permissions:
  contents: read
  deployments: write

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Prepare deploy directory
        run: |
          mkdir -p _deploy
          cp apps/hct-ml-marketing-lab.html _deploy/index.html

      - name: Deploy to Cloudflare Pages
        uses: cloudflare/pages-action@v1
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          projectName: hct-digital-marketing-ai-lab
          directory: _deploy
          gitHubToken: ${{ secrets.GITHUB_TOKEN }}
